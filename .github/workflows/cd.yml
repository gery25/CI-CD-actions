name: CD (Render)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Trigger Render Docker Build
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK }}